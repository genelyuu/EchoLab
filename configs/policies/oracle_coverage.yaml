# ECHO-Bench ORACLE_STRATEGY — coverage objective variant (Task C-010).
#
# An OBJECTIVE-SPECIFIC oracle, NOT a universal utility upper bound. It ranks
# candidate cards by marginal coordinate-COVERAGE gain (a card scores high when
# its coordinate-grid cell is unvisited so far) and is the regret reference for
# the COVERAGE_GAIN objective only. Reads only observable card/trace fields; no
# probe, no synthetic user, no user/persona/emotion signal.
policy: ORACLE_STRATEGY
k: 4
objective: COVERAGE_GAIN
